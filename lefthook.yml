pre-commit:
  parallel: true
  commands:
    lint:
      run: bun run lint:fix
      stage_fixed: true
      skip:
        - merge
        - rebase
    types:
      run: bun run check:types
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}