services:
  mariadb:
    image: mariadb:11
    container_name: musicalito-mariadb
    restart: unless-stopped
    ports:
      - "5306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: musicalito
      MARIADB_USER: musicalito
      MARIADB_PASSWORD: musicalito
    volumes:
      - musicalito_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: musicalito-valkey
    restart: unless-stopped
    ports:
      - "5379:6379"
    volumes:
      - musicalito_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: musicalito-minio
    restart: unless-stopped
    ports:
      - "5000:9000"
      - "5001:9001"
    environment:
      MINIO_ROOT_USER: musicalito
      MINIO_ROOT_PASSWORD: musicalito123
    volumes:
      - musicalito_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  musicalito_mariadb_data:
  musicalito_valkey_data:
  musicalito_minio_data: