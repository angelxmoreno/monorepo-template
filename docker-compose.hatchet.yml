services:
  hatchet:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    container_name: musicalito-hatchet
    restart: unless-stopped
    ports:
      - "7077:7077"
      - "7078:7078"
    environment:
      DATABASE_URL: postgres://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable
      DATABASE_TYPE: postgres
      RABBITMQ_URL: amqp://hatchet:hatchet@hatchet-rabbitmq:5672/
      REDIS_URL: redis://hatchet-redis:6379
      SERVER_PORT: "7077"
      GRPC_PORT: "7078"
      AUTH_COOKIE_SEED: "change-me-in-production"
      JWT_PUBLIC_KEY_FILE: /hatchet/keys/public.key
      JWT_PRIVATE_KEY_FILE: /hatchet/keys/private.key
      DEFAULT_SECRET: "change-me-in-production"
    depends_on:
      hatchet-postgres:
        condition: service_healthy
      hatchet-rabbitmq:
        condition: service_healthy
      hatchet-redis:
        condition: service_healthy
    volumes:
      - musicalito_hatchet_keys:/hatchet/keys

  hatchet-postgres:
    image: postgres:16
    container_name: musicalito-hatchet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    volumes:
      - musicalito_hatchet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 10s
      timeout: 5s
      retries: 5

  hatchet-rabbitmq:
    image: rabbitmq:4-management
    container_name: musicalito-hatchet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: hatchet
      RABBITMQ_DEFAULT_PASS: hatchet
    ports:
      - "15672:15672"
    volumes:
      - musicalito_hatchet_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  hatchet-redis:
    image: redis:7
    container_name: musicalito-hatchet-redis
    restart: unless-stopped
    volumes:
      - musicalito_hatchet_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  musicalito_hatchet_keys:
  musicalito_hatchet_postgres_data:
  musicalito_hatchet_rabbitmq_data:
  musicalito_hatchet_redis_data: